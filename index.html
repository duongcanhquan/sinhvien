<!DOCTYPE html>
<html lang="vi">
<head>
    <base target="_top">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>VIETMY COLLEGE - CỔNG THÔNG TIN SINH VIÊN</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    
    <style>
        /* ==========================================
           TỔNG QUAN & NỀN (BACKGROUND)
           ========================================== */
        body { 
            font-family: 'Montserrat', sans-serif; 
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab); 
            background-size: 400% 400%; 
            animation: gradientBG 15s ease infinite; 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 20px; 
            margin: 0; 
        }
        
        @keyframes gradientBG { 
            0% {background-position: 0% 50%;} 
            50% {background-position: 100% 50%;} 
            100% {background-position: 0% 50%;} 
        }
        
        /* ==========================================
           GLASS CARD (THẺ CHÍNH)
           ========================================== */
        .glass-card { 
            background: rgba(255, 255, 255, 0.85); 
            border-radius: 24px; 
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            padding: 40px 30px; 
            text-align: center; 
            width: 100%; 
            max-width: 900px; /* Tăng nhẹ để chứa đủ 4 nút trên 1 hàng cho thoải mái */
        }

        .portal-title {
            color: #2c3e50;
            font-weight: 800;
            font-size: 1.75rem;
            letter-spacing: -0.5px;
        }

        .section-title { 
            font-size: 0.85rem; 
            font-weight: 700; 
            color: #6c757d; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            margin: 25px 0 30px 0; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .section-title::before, .section-title::after { 
            content: ""; 
            height: 2px; 
            background: #cbd5e1; 
            flex-grow: 1;
            max-width: 60px;
            margin: 0 15px; 
            border-radius: 2px;
        }

        /* ==========================================
           NÚT CHỨC NĂNG (MENU BUTTONS)
           ========================================== */
        .role-btn { 
            background: rgba(255, 255, 255, 0.9); 
            border: 2px solid rgba(255, 255, 255, 1); 
            border-radius: 20px; 
            padding: 25px 10px; /* Chỉnh lại padding 2 bên để vừa 4 nút trên màn hình */
            text-align: center; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            cursor: pointer; 
            text-decoration: none; 
            color: #333; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            box-shadow: 0 8px 16px rgba(0,0,0,0.05); 
            height: 100%; 
        }
        
        .role-btn:hover { 
            transform: translateY(-8px); 
            border-color: #764ba2; 
            box-shadow: 0 15px 30px rgba(118, 75, 162, 0.2); 
            background: #ffffff;
        }
        
        .role-btn i { 
            font-size: 2.2rem; /* Giảm nhẹ size icon để cân đối với 4 cột */
            margin-bottom: 12px; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            transition: transform 0.3s ease;
        }

        .role-btn:hover i {
            transform: scale(1.1);
        }
        
        .role-title { 
            font-weight: 800; 
            font-size: 0.95rem; /* Giảm nhẹ font-size để tránh rớt chữ */
            margin-bottom: 6px; 
            color: #1e293b;
        }
        
        .role-btn small {
            font-size: 0.8rem;
            color: #64748b;
            line-height: 1.4;
        }

        /* ==========================================
           TỐI ƯU HÓA CHO ĐIỆN THOẠI (MOBILE RESPONSIVE)
           ========================================== */
        @media (max-width: 767px) {
            body { 
                padding: 15px; 
            }
            .glass-card { 
                padding: 30px 15px; 
                border-radius: 20px; 
            }
            .portal-title { 
                font-size: 1.25rem; 
                margin-bottom: 1rem !important; 
            }
            .glass-card img { 
                height: 50px !important; 
                margin-bottom: 15px !important; 
            }
            
            .section-title { 
                font-size: 0.75rem; 
                margin: 20px 0; 
                letter-spacing: 1px;
            }
            .section-title::before, .section-title::after { 
                max-width: 30px; 
                margin: 0 10px; 
            }
            
            .role-btn { 
                padding: 18px 8px; 
                border-radius: 16px; 
            }
            .role-btn i { 
                font-size: 1.8rem; 
                margin-bottom: 10px; 
            }
            .role-title { 
                font-size: 0.85rem; 
                margin-bottom: 4px; 
            }
            .role-btn small { 
                font-size: 0.7rem; 
            }
        }
    </style>
</head>
<body>
    <div class="glass-card animate__animated animate__fadeInUp">
        <img src="https://raw.githubusercontent.com/duongcanhquan/image/main/logo%20vietmy.webp" alt="VietMy Logo" style="height: 65px;" class="mb-3">
        
        <h2 class="portal-title mb-2">CỔNG THÔNG TIN ĐIỆN TỬ SINH VIÊN</h2>
        
        <div class="row g-3 justify-content-center mb-2 mt-4 text-center">
            
            <div class="col-6 col-md-4 col-lg-2">
                <a href="https://lichhoc.vietmycollege.com/" target="_blank" class="role-btn">
                    <i class="fas fa-calendar-alt"></i>
                    <div class="role-title">LỊCH HỌC HÀNG NGÀY</div>
                    <small>Thời khoá biểu học hàng ngày</small>
                </a>
            </div>
           
            <div class="col-6 col-md-4 col-lg-2">
                <a href="https://script.google.com/macros/s/AKfycbw_GPTl9OMaBZQsXiDjytzppN694RRhAy54r7NMeG4cEpHOsNTaLVTyxOGqh-bQvv8oRQ/exec?page=student" class="role-btn">
                    <i class="fas fa-user-graduate"></i>
                    <div class="role-title">ĐIỂM SỐ & DỊCH VỤ SV</div>
                    <small>Tra cứu điểm và các dịch vụ sinh viên</small>
                </a>
            </div>

            <div class="col-6 col-md-4 col-lg-2">
                <a href="https://khaothi.vietmycollege.com/lichthi/" class="role-btn">
                    <i class="fas fa-calendar-check"></i>
                    <div class="role-title">LỊCH THI</div>
                    <small>Tra cứu lịch thi</small>
                </a>
            </div>
            
            <div class="col-6 col-md-4 col-lg-2">
                <a href="https://khaothi.vietmycollege.com/phuckhao/" class="role-btn">
                    <i class="fas fa-file-signature"></i>
                    <div class="role-title">PHÚC KHẢO</div>
                    <small>Đăng ký phúc khảo bài thi</small>
                </a>
            </div>

            <div class="col-6 col-md-4 col-lg-2">
                <a href="https://jobs.vietmycollege.com" class="role-btn">
                    <i class="fas fa-file-signature"></i>
                    <div class="role-title">THỰC TẬP & VIỆC LÀM</div>
                    <small>Tìm thực tập và quản lý thực tập & việc làm</small>
                </a>
                
            </div>
        </div>
    </div>
</body>
</html>
